{% extends "admin/change_list.html" %}

{% block search %}
    {{ block.super }}
    <div style="
        margin: 15px 0;
        padding: 12px 15px;
        background: #f8f8f8;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
        font-weight: bold;
        color: #2c3e50;
    ">
        <span style="color: #666;">Total Amount (Filtered):</span> {{ total_amount_formatted }}
    </div>
{% endblock %}

{% block result_list %}
    {{ block.super }}
    <div style="
        margin: 15px 0;
        padding: 12px 15px;
        background: #f8f8f8;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
        font-weight: bold;
        text-align: right;
        color: #2c3e50;
    ">
        <span style="color: #666;">Total Amount (Filtered):</span> {{ total_amount_formatted }}
    </div>
{% endblock %}
