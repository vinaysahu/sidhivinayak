{% extends "admin/change_form.html" %}
{% load i18n admin_urls static admin_modify jazzmin %}

{% block content %}
    <style>
        .custom-btn-group {
            display: inline-flex;
            gap: 12px;
            margin-right: 12px;
        }
        .btn-custom-admin {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            border-radius: 8px;
            text-decoration: none !important;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }
        .btn-add-house { background-color: #10b981 !important; color: white !important; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2); }
        .btn-view-details { background-color: #6366f1 !important; color: white !important; box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2); }
        .btn-worker-attendance { background-color: #f59e0b !important; color: white !important; box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.2); }
        
        .btn-custom-admin:hover { transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); opacity: 0.95; }
        .btn-custom-admin:active { transform: translateY(0); }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var customButtons = `
                <div class="custom-btn-group">
                    <a href="{{ add_house_url }}" class="btn-custom-admin btn-add-house">
                        <i class="fas fa-plus-circle"></i> Add House
                    </a>
                    <a href="{{ view_details_url }}" class="btn-custom-admin btn-view-details">
                        <i class="fas fa-external-link-alt"></i> View Details
                    </a>
                    <a href="{{ worker_attendance_url }}" class="btn-custom-admin btn-worker-attendance">
                        <i class="fas fa-user-check"></i> Attendances
                    </a>
                </div>
            `;
            
            var rows = document.querySelectorAll('.submit-row-top div.d-flex, .submit-row-bottom div.d-flex');
            rows.forEach(function(row) {
                row.insertAdjacentHTML('afterbegin', customButtons);
            });
        });
    </script>
    {{ block.super }}
{% endblock %}
