{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SVED</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/modern_style.css' %}">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="glass-card p-5 fade-in" style="width: 400px; border-top: 4px solid var(--primary);">
    <div class="text-center mb-4">
        <h3 class="mb-1">Welcome Back</h3>
        <p class="text-muted small">Please enter your credentials to continue</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label small fw-bold">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter your username">
        </div>

        <div class="mb-4">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••">
        </div>

        <button class="btn btn-primary w-100 py-2">Sign In</button>
    </form>

    {% for message in messages %}
        <div class="alert alert-danger mt-3 p-2 small text-center">{{ message }}</div>
    {% endfor %}
</div>

</body>
</html>
